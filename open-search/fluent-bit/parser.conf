[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
    Decode_Field_As   escaped_utf8 log


[PARSER]
    Name        java
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?<level>[A-Z]+) +\[(?<thread>[^\]]+)\] (?<class>[^ ]+) - (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Decode_Field_As json log

[PARSER]
    Name         java_log
    Format       regex
    Regex        ^(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?<log_level>\w+) (?<component>[\w\.]+) - (?<message>.*)$
    Time_Key     timestamp
    Time_Format  %Y-%m-%d %H:%M:%S,%L
    Time_Keep    On

[PARSER]
    Name         hibernate_log
    Format       regex
    Regex        ^(?<component>Hibernate): (?<message>.*)$
    Time_Keep    On

[PARSER]
    Name        java_multiline
    Format      regex
    Regex       /^(?<time>\d{4}-\d{1,2}-\d{1,2} \d{1,2}:\d{1,2}:\d{1,2}) \[(?<thread>.*)\] (?<level>[^\s]+)(?<message>.*)/
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S