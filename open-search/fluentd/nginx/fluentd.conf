<source>
  @type tail
  path /var/log/nginx/access.log
  pos_file /fluentd/log/nginx-access.pos
  tag nginx.access
  format nginx
  reserve_data true
</source>

<source>
  @type tail
  path /var/log/nginx/error.log
  pos_file /fluentd/log/nginx-error.pos
  tag nginx.error

  format /^(?<time>\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}) \[(?<log_level>\w+)\] (?<pid>\d+)#(?<tid>\d+): (?<message>.*)$/
  time_key time
  reserve_data true

  #format multiline
  #format_firstline /^\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2} \[\w+\] (?<pid>\d+).(?<tid>\d+): /
  #format1 /^(?<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<log_level>\w+)\] (?<pid>\d+).(?<tid>\d+): (?<message>.*)/
  #multiline_flush_interval 3s
</source>

<filter nginx.error>
  @type record_transformer
  enable_ruby true
  <record>
    time ${time.iso8601}
  </record>
</filter>


<filter nginx.access>
  @type record_transformer
  enable_ruby true
  <record>
    time ${time.iso8601}
  </record>
</filter>

<filter nginx.access>
  @type geoip
  geoip_lookup_keys remote
  backend_library geoip2_c
  skip_adding_null_record  true
  geoip2_database /fluentd/GeoLite2-City.mmdb

  <record>
    city            ${city.names.en["remote"]}
    latitude        ${location.latitude["remote"]}
    longitude       ${location.longitude["remote"]}
    country         ${country.iso_code["remote"]}
    country_name    ${country.names.en["remote"]}
    postal_code     ${postal.code["remote"]}
    region_code     ${subdivisions.0.iso_code["remote"]}
    region_name     ${subdivisions.0.names.en["remote"]}
    origin_location  {"lat":"${location.latitude['remote']}","lon":"${location.longitude['remote']}"}
  </record>

</filter>

<match nginx.access>
  @type opensearch
  host opensearch-api.gfsolucoesti.com.br
  port 443
  scheme https
  user admin
  password 1qaz@WSX3edc
  index_name nginx-access
