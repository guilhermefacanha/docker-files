<source>
  @type tail
  path /var/lib/docker/containers/3aa52bff2cfc7cb500500e616d39b1f8cfbc603958ff5f56a238a76a4ec1b70b/*.log
  pos_file /fluentd/log/docker-containers.pos
  tag ged-tomcat
  <parse>
      @type json
      time_type string
      reserve_data true
      message_key log
      <parse>
        @type multiline
        format_firstline /^\d{2}-[A-Za-z]{3}-\d{4} \d{2}:\d{2}:\d{2}\.\d{3}/
        format1 /^(?<message>.*)$/
      </parse>
    </parse>
  # read_from_head true
</source>

<filter ged-tomcat>
  @type record_transformer
  enable_ruby true
  <record>
    time ${time.iso8601}
    log_level ${record["log"] =~ /DEBUG/ ? "DEBUG" : record["log"] =~ /INFO/ ? "INFO" : record["log"] =~ /WARNING/ ? "WARNING" : record["log"] =~ /ERROR/ ? "ERROR" : record["log"] =~ /SEVERE/ ? "SEVERE" : record["log"] =~ /Hibernate/ ? "Hibernate" : record["log"] =~ /Caused by:/ ? "Exception" : "UNKNOWN"}
  </record>
</filter>

<match ged-tomcat>
  @type opensearch
  host opensearch-api.gfsolucoesti.com.br
  port 443
  scheme https
  user admin
  password 1qaz@WSX3edc
  index_name ged-tomcat-log-fluentd
  type_name _doc
  ssl_verify false
  include_tag_key false
  logstash_format false
  <buffer>
    flush_interval 5s
    flush_at_shutdown true
  </buffer>
</match>

<system>
  log_level trace
</system>