<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSF Lab Builder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom border-secondary-subtle mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-info" href="#"><i class="bi bi-cloud-fill me-2"></i>DSF Lab Builder</a>
    <span id="nav-breadcrumb" class="text-secondary small me-auto ms-3"></span>
    <div class="d-flex align-items-center gap-2">
      <label class="text-secondary small mb-0 text-nowrap" for="nav-server-ip">
        <i class="bi bi-hdd-rack me-1"></i>Server IP
      </label>
      <input type="text" class="form-control form-control-sm font-monospace" id="nav-server-ip"
             style="width:175px" placeholder="localhost" autocomplete="off"
             title="Server IP or hostname — replaces localhost everywhere: FAM onboarding info, command previews, asset export">
    </div>
  </div>
</nav>

<div class="container-fluid px-4" id="main-content">
  <div class="d-flex justify-content-center align-items-center" style="height: 60vh;">
    <div class="spinner-border text-info" role="status"></div>
  </div>
</div>

<!-- Azure Database Detail Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="azDBOffcanvas" style="width:540px">
  <div class="offcanvas-header border-bottom border-secondary-subtle">
    <h6 class="offcanvas-title font-monospace" id="azDBOffcanvasTitle">Azure Database Info</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" title="Close panel"></button>
  </div>
  <div class="offcanvas-body p-0" id="azDBOffcanvasBody">
    <div class="d-flex justify-content-center align-items-center p-5">
      <div class="spinner-border spinner-border-sm text-info"></div>
    </div>
  </div>
</div>

<!-- Cloud SQL Detail Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cloudSQLOffcanvas" style="width:520px">
  <div class="offcanvas-header border-bottom border-secondary-subtle">
    <h6 class="offcanvas-title font-monospace" id="cloudSQLOffcanvasTitle">Cloud SQL Info</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" title="Close panel"></button>
  </div>
  <div class="offcanvas-body p-0" id="cloudSQLOffcanvasBody">
    <div class="d-flex justify-content-center align-items-center p-5">
      <div class="spinner-border spinner-border-sm text-info"></div>
    </div>
  </div>
</div>

<!-- RDS Detail Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="rdsOffcanvas" style="width:500px">
  <div class="offcanvas-header border-bottom border-secondary-subtle">
    <h6 class="offcanvas-title font-monospace" id="rdsOffcanvasTitle">RDS Info</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" title="Close panel"></button>
  </div>
  <div class="offcanvas-body p-0" id="rdsOffcanvasBody">
    <div class="d-flex justify-content-center align-items-center p-5">
      <div class="spinner-border spinner-border-sm text-info"></div>
    </div>
  </div>
</div>

<!-- Command Info Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cmdInfoOffcanvas" style="width:720px">
  <div class="offcanvas-header border-bottom border-secondary-subtle">
    <h6 class="offcanvas-title font-monospace" id="cmdInfoTitle">AWS Commands</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" title="Close"></button>
  </div>
  <div class="offcanvas-body" id="cmdInfoBody"></div>
</div>

<!-- RDS Create Confirm Modal -->
<div class="modal fade" id="rdsConfirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-database me-2 text-warning"></i>RDS Instance Already Exists</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" title="Cancel"></button>
      </div>
      <div class="modal-body" id="rdsConfirmBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-outline-warning" id="btn-rds-overwrite"
                title="Re-run setup on the existing instance (idempotent — updates parameter groups, CloudWatch export)">
          <i class="bi bi-arrow-repeat me-1"></i>Overwrite Existing
        </button>
        <button class="btn btn-warning" id="btn-rds-create-new"
                title="Create an additional RDS instance with a new identifier">
          <i class="bi bi-plus-circle me-1"></i>Create New Instance
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Job Output Modal -->
<div class="modal fade" id="jobModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="jobModalTitle">Running...</h5>
        <span class="badge ms-2" id="jobModalBadge"></span>
      </div>
      <div class="modal-body p-0">
        <pre id="jobOutput" class="job-output m-0 p-3"></pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="jobModalClose" disabled data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Templates ─────────────────────────────────────────────── -->

<template id="tpl-home">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-grid-3x3-gap me-2 text-info"></i>Environments</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-info btn-sm" id="btn-deploy"
              title="Deploy a new isolated AWS Floci (LocalStack) environment">
        <i class="bi bi-plus-circle me-1"></i>Deploy AWS Env
      </button>
      <button class="btn btn-outline-warning btn-sm" id="btn-deploy-gcp"
              title="Deploy a new isolated GCP Floci environment">
        <i class="bi bi-google me-1"></i>Deploy GCP Env
      </button>
      <button class="btn btn-outline-info btn-sm" id="btn-deploy-az"
              title="Deploy a new isolated Azure floci-az environment (port 6001+)">
        <i class="bi bi-microsoft me-1"></i>Deploy Azure Env
      </button>
    </div>
  </div>
  <div id="env-grid" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
    <div class="col"><div class="card h-100 text-center py-5 text-secondary border-dashed">
      <i class="bi bi-arrow-clockwise fs-1 opacity-50"></i>
      <p class="mt-2">Loading environments…</p>
    </div></div>
  </div>
</template>

<template id="tpl-env-card">
  <div class="col">
    <div class="card h-100 env-card" data-env-id="">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-bold env-name"></span>
        <span class="badge env-status-badge"></span>
      </div>
      <div class="card-body small">
        <div class="row g-1">
          <div class="col-5 text-secondary">Floci Port</div>
          <div class="col-7 font-monospace env-port"></div>
          <div class="col-5 text-secondary">Account ID</div>
          <div class="col-7 font-monospace env-account"></div>
          <div class="col-5 text-secondary">RDS Range</div>
          <div class="col-7 font-monospace env-rds-range"></div>
        </div>
      </div>
      <div class="card-footer d-flex gap-2">
        <button class="btn btn-sm btn-outline-info btn-open flex-grow-1"
                title="Open environment details — RDS, S3, FAM info, generators">
          <i class="bi bi-arrow-right-circle me-1"></i>Open
        </button>
        <button class="btn btn-sm btn-outline-danger btn-destroy"
                title="Destroy this environment — stops all containers and removes all data">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-env-detail">
  <div class="mb-3">
    <a href="#" class="text-decoration-none text-secondary small">
      <i class="bi bi-chevron-left me-1"></i>All Environments
    </a>
  </div>
  <div class="card mb-4">
    <div class="card-body d-flex flex-wrap gap-3 align-items-center">
      <h5 class="mb-0 me-3 fw-bold text-info" id="detail-title"></h5>
      <span class="badge" id="detail-status"></span>
      <div class="ms-auto d-flex gap-3 small font-monospace">
        <span title="Floci (LocalStack) port"><i class="bi bi-hdd-network me-1 text-secondary"></i><span id="detail-port"></span></span>
        <span title="AWS Account ID"><i class="bi bi-person-badge me-1 text-secondary"></i><span id="detail-account"></span></span>
        <span title="Docker network name"><i class="bi bi-diagram-3 me-1 text-secondary"></i><span id="detail-network"></span></span>
      </div>
    </div>
  </div>
  <ul class="nav nav-tabs mb-3" id="detail-tabs">
    <li class="nav-item"><a class="nav-link active" data-tab="resources" href="#">Resources</a></li>
    <li class="nav-item"><a class="nav-link" data-tab="create-rds" href="#">Create RDS</a></li>
    <li class="nav-item"><a class="nav-link" data-tab="fam" href="#">FAM / S3</a></li>
    <li class="nav-item"><a class="nav-link" data-tab="generator" href="#">Data Generator</a></li>
  </ul>
  <div id="detail-tab-content"></div>
</template>

<template id="tpl-tab-resources">
  <div class="row g-3">
    <div class="col-md-7">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-database me-2 text-warning"></i>RDS Instances</span>
          <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-detail"
                  title="Refresh resource list from LocalStack">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
        <div class="card-body p-0">
          <table class="table table-sm table-hover mb-0">
            <thead><tr><th>ID</th><th>Engine</th><th>Status</th><th>Endpoint</th><th class="text-center" style="width:100px">Actions</th></tr></thead>
            <tbody id="rds-tbody"><tr><td colspan="5" class="text-center text-secondary p-3">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card h-100">
        <div class="card-header"><i class="bi bi-bucket me-2 text-info"></i>S3 Buckets</div>
        <div class="card-body p-0">
          <ul class="list-group list-group-flush" id="bucket-list">
            <li class="list-group-item text-secondary text-center">Loading…</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Export panel -->
  <div class="card mt-3">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-file-earmark-spreadsheet text-success"></i>
      <span>Export DSF Hub Import Spreadsheet</span>
    </div>
    <div class="card-body">
      <p class="text-secondary small mb-3">
        Generates an <code>.xlsx</code> file with Cloud Account, RDS, and CloudWatch Log Group assets
        ready to import into DSF Hub. Fill in the fields below before downloading.
      </p>
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Server IP / Hostname
            <span class="text-secondary fw-normal">(replaces <code>localhost</code> in endpoint URLs)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="export-server-ip" placeholder="localhost" autocomplete="off">
        </div>
        <div class="col-md-5">
          <label class="form-label small">Agentless Gateway Name
            <span class="text-secondary fw-normal">(optional — fills <code>&lt;agentless-gateway-display-name&gt;</code>)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="export-gateway-name" placeholder="<agentless-gateway-display-name>" autocomplete="off">
        </div>
        <div class="col-md-3">
          <button class="btn btn-success btn-sm w-100" id="btn-export-assets"
                  title="Download DSF Hub import spreadsheet (.xlsx) for this environment">
            <i class="bi bi-download me-1"></i>Download Assets XLSX
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-create-rds">
  <div class="card" style="max-width:480px">
    <div class="card-header"><i class="bi bi-plus-circle me-2 text-warning"></i>Create RDS Instance</div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Engine</label>
        <select class="form-select" id="rds-engine">
          <option value="postgres">PostgreSQL</option>
          <option value="mysql">MySQL</option>
          <option value="mariadb">MariaDB</option>
        </select>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-warning" id="btn-create-rds"
                title="Create the selected RDS engine in this environment and stream the setup output">
          <i class="bi bi-play-fill me-1"></i>Create &amp; Stream Output
        </button>
        <button class="btn btn-outline-info" id="btn-rds-info"
                title="Preview the AWS CLI commands that will run">
          <i class="bi bi-info-circle"></i>
        </button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-fam">
  <div class="row g-3">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header"><i class="bi bi-plus-circle me-2 text-info"></i>Setup FAM Resources</div>
        <div class="card-body">
          <p class="text-secondary small mb-3">Creates FAM IAM user, source bucket, log destination bucket, and CloudTrail trail.</p>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-info" id="btn-create-fam"
                    title="Run FAM setup pipeline: IAM user → S3 buckets → CloudTrail trail">
              <i class="bi bi-play-fill me-1"></i>Setup &amp; Stream Output
            </button>
            <button class="btn btn-outline-info" id="btn-fam-info"
                    title="Preview the AWS CLI commands that will run">
              <i class="bi bi-info-circle"></i>
            </button>
          </div>
          <hr>
          <p class="text-secondary small mb-2">Generate traffic and wait for CloudTrail logs (~65 s):</p>
          <button class="btn btn-outline-info btn-sm" id="btn-test-fam"
                  title="PUT/GET/LIST test objects into source bucket, then wait 65s for CloudTrail flush and list the log destination">
            <i class="bi bi-lightning me-1"></i>Test FAM Traffic + Check Logs
          </button>
        </div>
      </div>
    </div>
    <div class="col-md-7">
      <div class="card h-100">
        <div class="card-header"><i class="bi bi-info-circle me-2"></i>Onboarding Info</div>
        <div class="card-body" id="fam-info-body">
          <p class="text-secondary small">Run setup first to see DSF Hub onboarding info.</p>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-generator">
  <div class="row g-3">

    <!-- FAM generator -->
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-bucket me-2 text-info"></i>FAM / S3 Background Generator</span>
          <span class="badge bg-secondary" id="fam-gen-badge">Stopped</span>
        </div>
        <div class="card-body">
          <p class="text-secondary small mb-2">Continuously simulates S3 file operations (PUT / GET / LIST / DELETE) to generate CloudTrail audit events.</p>
          <div class="d-flex gap-2 mb-2">
            <button class="btn btn-success btn-sm" id="btn-fam-gen-start"
                    title="Start FAM background activity generator (simulates S3 PUT/GET/LIST/DELETE)">
              <i class="bi bi-play-fill me-1"></i>Start
            </button>
            <button class="btn btn-danger btn-sm" id="btn-fam-gen-stop"
                    title="Stop the FAM generator">
              <i class="bi bi-stop-fill me-1"></i>Stop
            </button>
            <button class="btn btn-outline-secondary btn-sm ms-auto" id="btn-fam-gen-refresh"
                    title="Refresh FAM activity log">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
          <pre id="fam-gen-log" class="job-output gen-log p-2 m-0" style="max-height:180px">No activity yet.</pre>
        </div>
      </div>
    </div>

    <!-- RDS generators (populated dynamically) -->
    <div class="col-12">
      <div class="card">
        <div class="card-header"><i class="bi bi-database me-2 text-warning"></i>RDS Instance Generators</div>
        <div class="card-body" id="rds-gen-body">
          <p class="text-secondary small">Loading RDS instances…</p>
        </div>
      </div>
    </div>

  </div>
</template>

<template id="tpl-gcp-env-detail">
  <div class="mb-3">
    <a href="#" class="text-decoration-none text-secondary small">
      <i class="bi bi-chevron-left me-1"></i>All Environments
    </a>
  </div>
  <div class="card mb-4">
    <div class="card-body d-flex flex-wrap gap-3 align-items-center">
      <span class="badge bg-warning text-dark me-1"><i class="bi bi-google me-1"></i>GCP</span>
      <h5 class="mb-0 me-3 fw-bold text-warning" id="gcp-detail-title"></h5>
      <span class="badge" id="gcp-detail-status"></span>
      <div class="ms-auto d-flex gap-3 small font-monospace">
        <span title="floci-gcp port"><i class="bi bi-hdd-network me-1 text-secondary"></i><span id="gcp-detail-port"></span></span>
        <span title="GCP Project ID"><i class="bi bi-folder me-1 text-secondary"></i><span id="gcp-detail-project"></span></span>
        <span title="Docker network name"><i class="bi bi-diagram-3 me-1 text-secondary"></i><span id="gcp-detail-network"></span></span>
      </div>
    </div>
  </div>
  <ul class="nav nav-tabs mb-3" id="gcp-detail-tabs">
    <li class="nav-item"><a class="nav-link active" data-gcp-tab="cloudsql" href="#">Cloud SQL</a></li>
    <li class="nav-item"><a class="nav-link" data-gcp-tab="create-cloudsql" href="#">Create Cloud SQL</a></li>
    <li class="nav-item"><a class="nav-link" data-gcp-tab="gcp-generator" href="#">Data Generator</a></li>
  </ul>
  <div id="gcp-detail-tab-content"></div>
</template>

<template id="tpl-tab-cloudsql">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-database me-2 text-warning"></i>Cloud SQL Instances</span>
      <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-gcp-detail"
              title="Refresh Cloud SQL instance list">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="card-body p-0">
      <table class="table table-sm table-hover mb-0">
        <thead><tr><th>ID</th><th>Engine</th><th>Status</th><th>Endpoint</th><th class="text-center" style="width:100px">Actions</th></tr></thead>
        <tbody id="cloudsql-tbody"><tr><td colspan="5" class="text-center text-secondary p-3">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Export panel -->
  <div class="card mt-3">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-file-earmark-spreadsheet text-warning"></i>
      <span>Export DSF Hub Import Spreadsheet</span>
    </div>
    <div class="card-body">
      <p class="text-secondary small mb-3">
        Generates an <code>.xlsx</code> file with the GCP Cloud Account asset
        ready to import into DSF Hub. Fill in the fields below before downloading.
      </p>
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Server IP / Hostname
            <span class="text-secondary fw-normal">(replaces <code>localhost</code> in endpoint URLs)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="gcp-export-server-ip" placeholder="localhost" autocomplete="off">
        </div>
        <div class="col-md-5">
          <label class="form-label small">Agentless Gateway Name
            <span class="text-secondary fw-normal">(optional — fills <code>&lt;agentless-gateway-display-name&gt;</code>)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="gcp-export-gateway-name" placeholder="<agentless-gateway-display-name>" autocomplete="off">
        </div>
        <div class="col-md-3">
          <button class="btn btn-warning btn-sm w-100" id="btn-export-gcp-assets"
                  title="Download GCP DSF Hub import spreadsheet (.xlsx) for this environment">
            <i class="bi bi-download me-1"></i>Download Assets XLSX
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-create-cloudsql">
  <div class="card" style="max-width:480px">
    <div class="card-header"><i class="bi bi-plus-circle me-2 text-warning"></i>Create Cloud SQL Instance</div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Engine</label>
        <select class="form-select" id="cloudsql-engine">
          <option value="postgres">PostgreSQL</option>
        </select>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-warning" id="btn-create-cloudsql"
                title="Create the selected Cloud SQL engine and stream the setup output">
          <i class="bi bi-play-fill me-1"></i>Create &amp; Stream Output
        </button>
        <button class="btn btn-outline-info" id="btn-cloudsql-info"
                title="Preview the curl commands that will run">
          <i class="bi bi-info-circle"></i>
        </button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-gcp-generator">
  <div class="card">
    <div class="card-header"><i class="bi bi-database me-2 text-warning"></i>Cloud SQL Instance Generators</div>
    <div class="card-body" id="cloudsql-gen-body">
      <p class="text-secondary small">Loading Cloud SQL instances…</p>
    </div>
  </div>
</template>

<!-- ── Azure Templates ─────────────────────────────────────────── -->

<template id="tpl-az-env-detail">
  <div class="mb-3">
    <a href="#" class="text-decoration-none text-secondary small">
      <i class="bi bi-chevron-left me-1"></i>All Environments
    </a>
  </div>
  <div class="card mb-4">
    <div class="card-body d-flex flex-wrap gap-3 align-items-center">
      <span class="badge bg-info text-dark me-1"><i class="bi bi-microsoft me-1"></i>Azure</span>
      <h5 class="mb-0 me-3 fw-bold text-info" id="az-detail-title"></h5>
      <span class="badge" id="az-detail-status"></span>
      <div class="ms-auto d-flex gap-3 small font-monospace">
        <span title="floci-az port"><i class="bi bi-hdd-network me-1 text-secondary"></i><span id="az-detail-port"></span></span>
        <span title="Azure Subscription ID"><i class="bi bi-key me-1 text-secondary"></i><span id="az-detail-sub"></span></span>
        <span title="Docker network name"><i class="bi bi-diagram-3 me-1 text-secondary"></i><span id="az-detail-network"></span></span>
      </div>
    </div>
  </div>
  <ul class="nav nav-tabs mb-3" id="az-detail-tabs">
    <li class="nav-item"><a class="nav-link active" data-az-tab="azdb" href="#">Azure Databases</a></li>
    <li class="nav-item"><a class="nav-link" data-az-tab="create-azdb" href="#">Create Database</a></li>
    <li class="nav-item"><a class="nav-link" data-az-tab="az-generator" href="#">Data Generator</a></li>
  </ul>
  <div id="az-detail-tab-content"></div>
</template>

<template id="tpl-tab-azdb">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-database me-2 text-info"></i>Azure Managed Databases</span>
      <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-az-detail">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="card-body p-0">
      <table class="table table-sm table-hover mb-0">
        <thead><tr><th>Name</th><th>Engine</th><th>Status</th><th>Endpoint</th><th class="text-center" style="width:110px">Actions</th></tr></thead>
        <tbody id="azdb-tbody"><tr><td colspan="5" class="text-center text-secondary p-3">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Export panel -->
  <div class="card mt-3">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-file-earmark-spreadsheet text-info"></i>
      <span>Export DSF Hub Import Spreadsheet</span>
    </div>
    <div class="card-body">
      <p class="text-secondary small mb-3">
        Generates an <code>.xlsx</code> file with the Azure Cloud Account asset
        ready to import into DSF Hub. Fill in the fields below before downloading.
      </p>
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Server IP / Hostname
            <span class="text-secondary fw-normal">(replaces <code>localhost</code> in endpoint URLs)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="az-export-server-ip" placeholder="localhost" autocomplete="off">
        </div>
        <div class="col-md-5">
          <label class="form-label small">Agentless Gateway Name
            <span class="text-secondary fw-normal">(optional — fills <code>&lt;agentless-gateway-display-name&gt;</code>)</span>
          </label>
          <input type="text" class="form-control form-control-sm font-monospace"
                 id="az-export-gateway-name" placeholder="<agentless-gateway-display-name>" autocomplete="off">
        </div>
        <div class="col-md-3">
          <button class="btn btn-info btn-sm w-100" id="btn-export-az-assets"
                  title="Download Azure DSF Hub import spreadsheet (.xlsx) for this environment">
            <i class="bi bi-download me-1"></i>Download Assets XLSX
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-create-azdb">
  <div class="card" style="max-width:480px">
    <div class="card-header"><i class="bi bi-plus-circle me-2 text-info"></i>Create Azure Database</div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Engine</label>
        <select class="form-select" id="azdb-engine">
          <option value="mysql">Azure Database for MySQL (Flexible)</option>
          <option value="mariadb">Azure Database for MariaDB (Single)</option>
          <option value="postgres">Azure Database for PostgreSQL (Flexible)</option>
        </select>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-info" id="btn-create-azdb">
          <i class="bi bi-play-fill me-1"></i>Create &amp; Stream Output
        </button>
        <span class="text-secondary small" id="azdb-suggest-label"></span>
      </div>
    </div>
  </div>
</template>

<template id="tpl-tab-az-generator">
  <div class="card">
    <div class="card-header"><i class="bi bi-database me-2 text-info"></i>Azure Database Generators</div>
    <div class="card-body" id="az-gen-body">
      <p class="text-secondary small">Loading Azure databases…</p>
    </div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
