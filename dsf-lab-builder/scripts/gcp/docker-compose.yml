services:
  floci-gcp:
    image: floci/floci-gcp:latest
    ports:
      - "${FLOCI_GCP_PORT:-4588}:4588"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      FLOCI_DOCKER_DOCKER_HOST: unix:///var/run/docker.sock
      FLOCI_SERVICES_DOCKER_NETWORK: "${FLOCI_GCP_NETWORK:-floci-gcp1_default}"
      FLOCI_GCP_DEFAULT_PROJECT: "${GCP_PROJECT_ID:-floci-gcp-lab-1}"
    restart: always

  gcp-log-shipper:
    build:
      context: .
      dockerfile: Dockerfile.gcp-log-shipper
    depends_on:
      - floci-gcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GCP_ENDPOINT_URL: http://floci-gcp:4588
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-floci-gcp-lab-1}"
      GCP_REGION: "${GCP_REGION:-us-central1}"
      POLL_INTERVAL: "10"
      FLUSH_INTERVAL: "2"
      BATCH_SIZE: "100"
    restart: always

networks:
  default:
    name: "${FLOCI_GCP_NETWORK:-floci-gcp1_default}"
